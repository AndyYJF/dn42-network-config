name: validate-network-config

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate and render the four-node topology
        run: python3 render.py --check
      - name: Run configuration and rollback tests
        run: python3 -m unittest discover -s . -p 'test_*.py' -v
